[build]
  command = "pip install -r requirements.txt && python build.py"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.11"

# Redirects for clean URLs
[[redirects]]
  from = "/about"
  to = "/about/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact/index.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services/index.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/portfolio/index.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/thank-you/index.html"
  status = 200

# Dynamic project pages (generated per Supabase slug)
[[redirects]]
  from = "/project/*"
  to = "/project/:splat/index.html"
  status = 200

# Legacy project URLs → new dynamic slugs
[[redirects]]
  from = "/seo_helper_master"
  to = "/project/seo-master"
  status = 301

[[redirects]]
  from = "/time_center"
  to = "/project/time-center-ecommerce"
  status = 301

# Headers for caching and security
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
